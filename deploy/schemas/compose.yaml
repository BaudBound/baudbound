services:
  schemas:
    image: ghcr.io/natroutter/baudbound-schemas:latest
    container_name: baudbound-schemas
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q '^ok$'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
