name: Runner CI

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/baudbound/**"
      - "apps/editor/**"
      - "crates/**"
      - "schemas/**"
      - ".github/workflows/runner-ci.yml"
  push:
    branches:
      - v2
      - master
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/baudbound/**"
      - "apps/editor/**"
      - "crates/**"
      - "schemas/**"
      - ".github/workflows/runner-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/baudbound/ui/pnpm-lock.yaml

      - name: Install desktop UI dependencies
        run: pnpm --dir apps/baudbound/ui install --frozen-lockfile

      - name: Build desktop UI
        run: pnpm --dir apps/baudbound/ui build

      - name: Check Rust formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Build runner application
        run: cargo build -p baudbound --locked

  editor-contract:
    name: Editor contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/editor/pnpm-lock.yaml

      - name: Install editor dependencies
        run: pnpm --dir apps/editor install --frozen-lockfile

      - name: Verify schemas are current
        run: pnpm --dir apps/editor schemas:check

      - name: Run editor contract tests
        run: pnpm --dir apps/editor test

  desktop-ui:
    name: Desktop UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/baudbound/ui/pnpm-lock.yaml

      - name: Install desktop UI dependencies
        run: pnpm --dir apps/baudbound/ui install --frozen-lockfile

      - name: Typecheck desktop UI
        run: pnpm --dir apps/baudbound/ui typecheck

      - name: Build desktop UI
        run: pnpm --dir apps/baudbound/ui build
