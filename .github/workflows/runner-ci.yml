name: Runner CI

on:
  schedule:
    - cron: "17 3 * * *"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/baudbound/**"
      - "apps/editor/**"
      - "crates/**"
      - "deploy/get/**"
      - "schemas/**"
      - "deny.toml"
      - "tools/runner-release.ps1"
      - "tools/lib/**"
      - ".github/dependabot.yml"
      - ".github/workflows/runner-ci.yml"
      - ".github/workflows/runner-release.yml"
  push:
    branches:
      - master
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/baudbound/**"
      - "apps/editor/**"
      - "crates/**"
      - "deploy/get/**"
      - "schemas/**"
      - "deny.toml"
      - "tools/runner-release.ps1"
      - "tools/lib/**"
      - ".github/dependabot.yml"
      - ".github/workflows/runner-ci.yml"
      - ".github/workflows/runner-release.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  linux-installer-contract:
    name: Linux installer contract
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install shell verifier
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check installer shell scripts
        run: >-
          shellcheck
          deploy/get/public/linux
          deploy/get/tests/linux.sh
          apps/baudbound/scripts/test-linux-package-install.sh

      - name: Test hosted Linux installer
        run: bash deploy/get/tests/linux.sh

  dependency-security:
    name: Rust dependency advisories (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check RustSec advisories
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25
        with:
          command: check advisories
          arguments: --all-features --locked --target ${{ matrix.target }}

  rust:
    name: Rust workspace (${{ matrix.os }})
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libudev-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            xdg-utils

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/baudbound/ui/pnpm-lock.yaml

      - name: Install desktop UI dependencies
        run: pnpm --dir apps/baudbound/ui install --frozen-lockfile

      - name: Build desktop UI
        run: pnpm --dir apps/baudbound/ui build

      - name: Check Rust formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Build runner application
        run: cargo build -p baudbound --locked

  editor-contract:
    name: Editor contract
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/editor/pnpm-lock.yaml

      - name: Install editor dependencies
        run: pnpm --dir apps/editor install --frozen-lockfile

      - name: Verify schemas are current
        run: pnpm --dir apps/editor schemas:check

      - name: Run editor contract tests
        run: pnpm --dir apps/editor test

  desktop-ui:
    name: Desktop UI
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/baudbound/ui/pnpm-lock.yaml

      - name: Install desktop UI dependencies
        run: pnpm --dir apps/baudbound/ui install --frozen-lockfile

      - name: Typecheck desktop UI
        run: pnpm --dir apps/baudbound/ui typecheck

      - name: Test desktop UI contracts
        run: pnpm --dir apps/baudbound/ui test

      - name: Build desktop UI
        run: pnpm --dir apps/baudbound/ui build

      - name: Test release artifact contracts
        run: node --test apps/baudbound/scripts/*.test.mjs
