name: Website Docker

on:
  pull_request:
    paths:
      - "apps/website/**"
      - ".github/workflows/website-docker.yml"
  push:
    branches:
      - master
    tags:
      - "website-v*"
      - "v*"
    paths:
      - "apps/website/**"
      - ".github/workflows/website-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BUILD_CONTEXT: apps/website
  DOCKERFILE: apps/website/Dockerfile

jobs:
  build:
    name: Build website image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          raw_image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/baudbound-website"
          image="$(printf '%s' "$raw_image" | tr '[:upper:]' '[:lower:]')"
          echo "Using image name: ${image}"
          echo "name=${image}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.title=BaudBound Website
            org.opencontainers.image.description=Public website for BaudBound.
            org.opencontainers.image.vendor=BaudBound

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=website
          cache-to: type=gha,mode=max,scope=website
