name: Installer Docker

on:
  pull_request:
    paths:
      - "deploy/get/**"
      - ".github/workflows/get-docker.yml"
  push:
    branches:
      - master
    tags:
      - "get-v*"
      - "v*"
    paths:
      - "deploy/get/**"
      - ".github/workflows/get-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BUILD_CONTEXT: .
  DOCKERFILE: deploy/get/Dockerfile

jobs:
  test-linux:
    name: Test Linux installer and container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install --yes jq shellcheck

      - name: Check shell scripts
        run: shellcheck deploy/get/public/linux deploy/get/tests/linux.sh deploy/get/tests/container.sh

      - name: Test Linux installer
        run: bash deploy/get/tests/linux.sh

      - name: Test container endpoints
        run: bash deploy/get/tests/container.sh

  test-windows:
    name: Test Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $allErrors = @()
          $scripts = @("deploy/get/public/windows", "deploy/get/tests/windows.ps1", "deploy/get/tests/http-server.ps1")
          foreach ($script in $scripts) {
            $tokens = $null
            $fileErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$fileErrors
            )
            $allErrors += $fileErrors
          }
          if ($allErrors.Count -gt 0) {
            $allErrors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Test Windows installer
        shell: pwsh
        run: ./deploy/get/tests/windows.ps1

  build:
    name: Build installer image
    needs:
      - test-linux
      - test-windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          raw_image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/baudbound-get"
          image="$(printf '%s' "$raw_image" | tr '[:upper:]' '[:lower:]')"
          echo "Using image name: ${image}"
          echo "name=${image}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.title=BaudBound Installer Service
            org.opencontainers.image.description=Static verified install and update entry points for BaudBound.
            org.opencontainers.image.vendor=BaudBound

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=get
          cache-to: type=gha,mode=max,scope=get
