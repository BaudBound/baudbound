services:
  website:
    image: ghcr.io/natroutter/baudbound-website:latest
    container_name: baudbound-website
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      # script.js records visits and events. recorder.js additionally records sampled
      # replays and heatmaps when enabled for this website in Umami. Leave the tracker
      # URL or website ID unset to disable analytics entirely.
      UMAMI_TRACKER_SRC: https://analytics.nat.gg/script.js
      UMAMI_RECORDER_SRC: https://analytics.nat.gg/recorder.js
      UMAMI_WEBSITE_ID: "" # TODO: set to this site's website ID from the Umami dashboard
